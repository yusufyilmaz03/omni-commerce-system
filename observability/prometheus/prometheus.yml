global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: api-gateway
    metrics_path: /metrics
    static_configs:
      - targets:
          - api-gateway:3000

  - job_name: product-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - product-service:3001

  - job_name: order-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - order-service:3002

  - job_name: payment-service
    metrics_path: /metrics
    static_configs:
      - targets:
          - payment-service:3003
