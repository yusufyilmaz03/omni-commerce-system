apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: omni-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: omni-commerce/api-gateway:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: omni-commerce-secrets
                  key: JWT_SECRET
          envFrom:
            - configMapRef:
                name: omni-commerce-config
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: omni-commerce
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 3000
      targetPort: 3000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: product-service
  namespace: omni-commerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: product-service
  template:
    metadata:
      labels:
        app: product-service
    spec:
      containers:
        - name: product-service
          image: omni-commerce/product-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3001
          env:
            - name: PORT
              value: "3001"
            - name: PRODUCT_DB_HOST
              value: product-db
            - name: PRODUCT_DB_PORT
              value: "5432"
            - name: PRODUCT_DB_NAME
              value: product_db
            - name: PRODUCT_DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: omni-commerce-secrets
                  key: POSTGRES_USER
            - name: PRODUCT_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: omni-commerce-secrets
                  key: POSTGRES_PASSWORD
          envFrom:
            - configMapRef:
                name: omni-commerce-config
---
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: omni-commerce
spec:
  selector:
    app: product-service
  ports:
    - port: 3001
      targetPort: 3001
---
